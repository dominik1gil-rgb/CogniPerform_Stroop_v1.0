<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniPerform // Stroop_v2.6</title>
    <style>
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
            --red: #ff0000;
            --green: #00ff00;
            --blue: #3366ff;
            --yellow: #ffff00;
            --orange: #ff8800;
            --teal: #00ffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 20px;
            text-align: center;
            overflow: hidden;
        }
        
        #status-bar {
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
            margin-bottom: 30px;
            width: 95%;
        }

        #ui-layer, #result-layer { width: 100%; max-width: 500px; }
        #result-layer { display: none; margin-top: 40px; }

        #timer { font-size: 1.1rem; color: var(--orange); margin-bottom: 10px; font-weight: bold; }
        #word-display {
            font-size: 3.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin: 20px 0;
            min-height: 110px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
        }
        button {
            background: #161b22;
            border: 1px solid #30363d;
            color: var(--text);
            padding: 12px 2px;
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }
        button:active { transform: scale(0.95); background: #30363d; }
        
        .summary-box { border: 2px solid var(--teal); padding: 30px; border-radius: 12px; background: #161b22; }
        .restart-btn { margin-top: 25px; background: var(--teal); color: #000; font-weight: bold; border: none; padding: 12px 30px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div style="font-size: 0.65rem; color: var(--teal); opacity: 0.7; letter-spacing: 2px; margin-bottom: 8px;">
            [ PROTOCOL: STROOP_CORE ] &nbsp; [ LIMIT: 60s ] &nbsp; [ TARGET: INHIBITION ]
        </div>
        <div style="font-size: 0.9rem; color: #ffffff; font-weight: 500; letter-spacing: 0.5px;">
            <span style="color: var(--orange);"> > </span> IDENTIFY THE <span style="color: var(--orange); font-weight: bold;">COLOR</span>. IGNORE THE TEXT. USE [1-4] OR MOUSE.
        </div>
    </div>

    <div id="ui-layer">
        <div id="timer">READY? PRESS [1-4] TO START</div>
        <div id="word-display">▓▓▓▓▓</div>
        <div class="controls" id="btn-group"></div>
    </div>

    <div id="result-layer">
        <div class="summary-box">
            <h2 style="color:var(--teal)">SESSION COMPLETE</h2>
            <p>Hits: <span id="final-hits" style="color:var(--green); font-weight:bold;">0</span></p>
            <p>Misses: <span id="final-misses" style="color:var(--red); font-weight:bold;">0</span></p>
            <hr style="border:0; border-top:1px solid #30363d; margin: 15px 0;">
            <p>Accuracy: <span id="final-acc" style="font-size:1.5rem;">0</span>%</p>
            <button class="restart-btn" onclick="location.reload()">RESTART</button>
        </div>
    </div>

    <script>
        const colors = [
            { name: 'RED',    hex: '#ff0000', key: '1' },
            { name: 'GREEN',  hex: '#00ff00', key: '2' },
            { name: 'BLUE',   hex: '#3366ff', key: '3' },
            { name: 'YELLOW', hex: '#ffff00', key: '4' }
        ];

        let hits = 0, misses = 0, timeLeft = 60, timerActive = false, currentTarget = '';
        let started = false;

        const wordEl = document.getElementById('word-display');
        const timerEl = document.getElementById('timer');
        const btnGroup = document.getElementById('btn-group');

        colors.forEach((c) => {
            const btn = document.createElement('button');
            btn.innerText = `[${c.key}] ${c.name}`;
            btn.onclick = () => handleInput(c.name);
            btnGroup.appendChild(btn);
        });

        function handleInput(selected) {
            if (!started) {
                started = true;
                nextRound();
                startTimer();
                return;
            }
            selected === currentTarget ? hits++ : misses++;
            nextRound();
        }

        function startTimer() {
            timerActive = true;
            timerEl.innerText = `TIME REMAINING: ${timeLeft}s`;
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = `TIME REMAINING: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    endGame();
                }
            }, 1000);
        }

        function nextRound() {
            const wIdx = Math.floor(Math.random() * colors.length);
            let cIdx;
            do { cIdx = Math.floor(Math.random() * colors.length); } while (cIdx === wIdx);
            wordEl.innerText = colors[wIdx].name;
            wordEl.style.color = colors[cIdx].hex;
            currentTarget = colors[cIdx].name;
        }

        function endGame() {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('result-layer').style.display = 'block';
            document.getElementById('final-hits').innerText = hits;
            document.getElementById('final-misses').innerText = misses;
            const acc = (hits + misses) > 0 ? Math.round((hits / (hits + misses)) * 100) : 0;
            document.getElementById('final-acc').innerText = acc;
        }

        window.addEventListener('keydown', (e) => {
            const color = colors.find(c => c.key === e.key);
            if (color) handleInput(color.name);
        });
    </script>
</body>
</html>
