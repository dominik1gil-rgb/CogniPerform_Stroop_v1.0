<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniPerform // Reaction_Drill_v1.0</title>
    <style>
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
            --red: #ff4444;
            --green: #00ff00;
            --blue: #3366ff;
            --teal: #00ffff;
            --orange: #ff8800;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 20px;
            text-align: center;
            overflow: hidden;
            cursor: pointer; /* Cała strona jest przyciskiem */
        }
        
        #status-bar {
            font-size: 0.7rem;
            color: var(--teal);
            letter-spacing: 1px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            width: 90%;
            margin-bottom: 40px;
            opacity: 0.8;
            pointer-events: none;
        }

        #main-zone {
            width: 90%;
            max-width: 500px;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #30363d;
            border-radius: 12px;
            transition: background 0.1s;
        }

        #instruction { font-size: 1.2rem; font-weight: bold; pointer-events: none; }
        #ms-display { font-size: 3rem; color: var(--teal); margin-top: 10px; display: none; }

        .summary-box { 
            display: none;
            border: 2px solid var(--teal); 
            padding: 30px; 
            border-radius: 12px; 
            background: #161b22;
            max-width: 400px;
        }
        .restart-btn { 
            margin-top: 25px; 
            background: var(--teal); 
            color: #000; 
            font-weight: bold; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            border-radius: 4px; 
        }
    </style>
</head>
<body onclick="handleClick()">

    <div id="status-bar">
        [ PROTOCOL: REACTION_DRILL ] &nbsp; [ TRIALS: 5 ] &nbsp; [ TARGET: NEURAL_SPEED ]
    </div>

    <div id="main-zone">
        <div id="instruction">CLICK TO START</div>
        <div id="ms-display">0 ms</div>
    </div>

    <div id="summary" class="summary-box">
        <h2 style="color:var(--teal)">DRILL COMPLETE</h2>
        <p>Average Speed: <span id="avg-speed" style="color:var(--green); font-weight:bold; font-size: 1.5rem;">0</span> ms</p>
        <p id="feedback" style="font-size: 0.8rem; color: #8b949e;"></p>
        <button class="restart-btn" onclick="location.reload()">RESTART</button>
    </div>

    <script>
        let state = 'IDLE'; // IDLE, WAITING, CLICKABLE, FINISHED
        let startTime, timeout;
        let trials = [];
        const maxTrials = 5;

        const mainZone = document.getElementById('main-zone');
        const instruction = document.getElementById('instruction');
        const msDisplay = document.getElementById('ms-display');
        const summary = document.getElementById('summary');

        function handleClick() {
            if (state === 'IDLE') {
                startTrial();
            } else if (state === 'WAITING') {
                tooEarly();
            } else if (state === 'CLICKABLE') {
                recordReaction();
            }
        }

        function startTrial() {
            state = 'WAITING';
            msDisplay.style.display = 'none';
            instruction.innerText = 'WAIT FOR GREEN...';
            mainZone.style.background = '#881111'; // Ciemny czerwony
            
            const delay = Math.floor(Math.random() * 3000) + 2000; // 2-5 sekund
            timeout = setTimeout(() => {
                state = 'CLICKABLE';
                mainZone.style.background = '#00ff00'; // Jasny zielony
                instruction.innerText = 'CLICK NOW!';
                instruction.style.color = '#000';
                startTime = window.performance.now();
            }, delay);
        }

        function tooEarly() {
            clearTimeout(timeout);
            state = 'IDLE';
            mainZone.style.background = 'transparent';
            instruction.innerText = 'TOO EARLY! CLICK TO TRY AGAIN';
            instruction.style.color = 'var(--red)';
        }

        function recordReaction() {
            const endTime = window.performance.now();
            const reactionTime = Math.round(endTime - startTime);
            trials.push(reactionTime);
            
            state = 'IDLE';
            mainZone.style.background = 'transparent';
            instruction.style.color = 'var(--text)';
            instruction.innerText = 'SUCCESS!';
            msDisplay.innerText = reactionTime + ' ms';
            msDisplay.style.display = 'block';

            if (trials.length < maxTrials) {
                setTimeout(() => {
                    if (state === 'IDLE') instruction.innerText = 'CLICK FOR NEXT TRIAL (' + (trials.length + 1) + '/' + maxTrials + ')';
                }, 1000);
            } else {
                showSummary();
            }
        }

        function showSummary() {
            state = 'FINISHED';
            document.getElementById('main-zone').style.display = 'none';
            summary.style.display = 'block';
            const avg = Math.round(trials.reduce((a, b) => a + b) / maxTrials);
            document.getElementById('avg-speed').innerText = avg;
            
            let msg = '';
            if (avg < 200) msg = "ELITE: NEURAL SUPERCONDUCTOR";
            else if (avg < 250) msg = "PRO: OPTIMIZED RESPONSE";
            else msg = "STANDARD: NEEDS CALIBRATION";
            document.getElementById('feedback').innerText = msg;
        }

        // Obsługa spacji
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleClick();
            }
        });
    </script>
</body>
</html>
